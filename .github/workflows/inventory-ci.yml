name: Inventory Service CI

on:
  push:
    branches: [ "**" ]
    paths:
      - "inventory/**"
      - "common-library/**"
      - ".github/workflows/inventory-ci.yml"
      - "pom.xml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "inventory/**"
      - "common-library/**"
      - ".github/workflows/inventory-ci.yml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-son

      - name: Build and Test with Maven
        run: |
          mvn clean install -pl inventory -am -Drevision=1.0-SNAPSHOT -B
        
      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ANALYTICS_OPTOUT: 1
        run: |
          curl -L https://downloads.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk
          mv snyk /usr/local/bin/
          snyk test \
            --file=inventory/pom.xml \
            -- -Drevision=1.0-SNAPSHOT

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -pl inventory -am \
            -Drevision=1.0-SNAPSHOT \
            -Dsonar.projectKey=baus-9105_yas \
            -Dsonar.organization=ffr-key \
            -Dsonar.coverage.jacoco.xmlReportPaths=inventory/target/site/jacoco/jacoco.xml
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Inventory-Service-Unit-Test-Results
          path: "inventory/**/surefire-reports/*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/inventory/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Inventory Coverage Report'
          update-comment: true