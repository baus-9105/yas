name: Media Service CI

on:
  push:
    branches: [ "**" ]
    paths:
      - "media/**"
      - "common-library/**"
      - ".github/workflows/media-ci.yml"
      - "pom.xml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "media/**"
      - "common-library/**"
      - ".github/workflows/media-ci.yml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn clean install -pl media -am -DskipTests -Drevision=1.0-SNAPSHOT
        
      - name: Test with Maven
        run: mvn verify -pl media -am -Drevision=1.0-SNAPSHOT

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/**/surefire-reports/*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/media/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Media Coverage Report'
          update-comment: true
