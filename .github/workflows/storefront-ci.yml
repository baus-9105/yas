name: Storefront Service CI

on:
  push:
    branches: [ "**" ]
    tags:
      - "v*"
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: storefront/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: storefront

      - name: Build
        run: npm run build
        working-directory: storefront

      - name: Lint
        run: npm run lint
        working-directory: storefront

      - name: Format Check
        run: npx prettier --check .
        working-directory: storefront
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --omit=dev
        working-directory: storefront
        continue-on-error: true

      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ANALYTICS_OPTOUT: 1
        run: |
          curl -L https://downloads.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk
          mv snyk /usr/local/bin/
          snyk test --file=storefront/package.json

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: storefront
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/storefront:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/storefront:latest', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/storefront:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || '' }}
  
  update-dev:
    needs: build-and-test 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/gitops-updater.yml
    with:
      service_name: 'storefront'
      environment: 'dev'
      image_tag: ${{ github.sha }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

  update-staging:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/gitops-updater.yml
    with:
      service_name: 'storefront'
      environment: 'staging'
      image_tag: ${{ github.ref_name }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
