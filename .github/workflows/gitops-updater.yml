name: Reusable GitOps Updater

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: "Tên của microservice (ví dụ: cart, payment)"
      environment:
        required: true
        type: string
        description: "Môi trường deploy (dev hoặc staging)"
      image_tag:
        required: true
        type: string
        description: "Tag của Docker Image cần deploy"
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: baus-9105/yas-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops

      - name: Update file values.yaml and Push to GitOps Repository
        run: |
          cd yas-gitops
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          CHART_NAME="${{ inputs.service_name }}"
          if [[ "$CHART_NAME" == "backoffice" || "$CHART_NAME" == "storefront" ]]; then
            CHART_NAME="${CHART_NAME}-ui"
          fi

          TARGET_FILE="environments/${{ inputs.environment }}/$CHART_NAME/values.yaml"
          TAG="${{ inputs.image_tag }}"
          
          yq e ".backend.image.tag = \"${TAG}\"" -i $TARGET_FILE
          
          git add $TARGET_FILE
          git commit -m "ci(${{ inputs.environment }}): update ${{ inputs.service_name }} to $TAG"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git pull --rebase origin main && git push origin main; then
              echo "Push successful!"
              break
            else
              echo "Push failed. Retrying in 5 seconds... ($i/$MAX_RETRIES)"
              if [ $i -eq $MAX_RETRIES ]; then
                echo "Failed to push after $MAX_RETRIES attempts."
                exit 1
              fi
              sleep 5
            fi
          done