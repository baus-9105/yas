name: Cart Service CI

on:
  push:
    branches: [ "**" ]
    paths:
      - "cart/**"
      - "common-library/**"
      - ".github/workflows/cart-ci.yml"
      - "pom.xml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - "common-library/**"
      - ".github/workflows/cart-ci.yml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-son

      - name: Build and Test with Maven
        run: |
          mvn clean verify -pl cart -am -Drevision=1.0-SNAPSHOT -B
        
      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true # Ensures SARIF upload runs even if vulnerabilities are found
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ORG: ${{ secrets.SNYK_ORG }}
        run: |
          mvn --version
          curl -L https://downloads.snyk.io/cli/latest/snyk-linux -o snyk && \
          chmod +x snyk && \
          mv snyk /usr/local/bin/
          snyk test \
            -d \
            --org=$SNYK_ORG \
            --file=cart/pom.xml \
            --maven-aggregate-project \
            --sarif-file-output=snyk.sarif \
            -- -Drevision=1.0-SNAPSHOT
      
      - name: Upload Snyk report to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -pl cart -am \
            -Drevision=1.0-SNAPSHOT \
            -Dsonar.projectKey=baus-9105_yas \
            -Dsonar.organization=ffr-key \
            -Dsonar.coverage.jacoco.xmlReportPaths=cart/target/site/jacoco/jacoco.xml
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Cart-Service-Unit-Test-Results
          path: "cart/**/surefire-reports/*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/cart/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Cart Coverage Report'
          update-comment: true