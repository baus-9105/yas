name: Cart Service CI

on:
  push:
    branches: [ "**" ]
    paths:
      - "cart/**"
      - "common-library/**"
      - ".github/workflows/cart-ci.yml"
      - "pom.xml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - "common-library/**"
      - ".github/workflows/cart-ci.yml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
        
      - name: Run Snyk to check for vulnerabilities
        run: |
          npm install -g snyk
          snyk test --file=cart/pom.xml --maven-aggregate-project --sarif-file-output=snyk.sarif
        continue-on-error: true # To make sure that SARIF upload gets called
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      
      - name: Build with Maven
        run: mvn clean install -pl cart -am -DskipTests -Drevision=1.0-SNAPSHOT
        
      - name: Test with Maven
        run: mvn verify -pl cart -am -Drevision=1.0-SNAPSHOT

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Cart-Service-Unit-Test-Results
          path: "cart/**/surefire-reports/*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/cart/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Cart Coverage Report'
          update-comment: true
