name: Cart Service CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "cart/**"
      - ".github/workflows/cart-ci.yml"
      - "pom.xml"
  workflow_dispatch:


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        run: mvn clean install -pl cart -am
        
      - name: Test with Maven
        run: mvn test -pl cart

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Cart Service Unit Test Results
          path: "cart/**/surefire-reports/*.xml"
          reporter: java-junit



              
            
