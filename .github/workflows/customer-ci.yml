name: Customer Service CI

on:
  push:
    branches: [ "**" ]
    tags:
      - "v*"
    paths:
      - "customer/**"
      - "common-library/**"
      - ".github/workflows/customer-ci.yml"
      - "pom.xml"

  pull_request:
    branches: [ "main" ]
    paths:
      - "customer/**"
      - "common-library/**"
      - ".github/workflows/customer-ci.yml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-son

      - name: Build and Test with Maven
        run: |
          mvn clean install -pl customer -am -Drevision=1.0-SNAPSHOT -B
        
      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_ANALYTICS_OPTOUT: 1
        run: |
          curl -L https://downloads.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk
          mv snyk /usr/local/bin/
          snyk test \
            --file=customer/pom.xml \
            -- -Drevision=1.0-SNAPSHOT

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -pl customer -am \
            -Drevision=1.0-SNAPSHOT \
            -Dsonar.projectKey=ffr-key_yas-customer \
            -Dsonar.organization=ffr-key \
            -Dsonar.coverage.jacoco.xmlReportPaths=customer/target/site/jacoco/jacoco.xml
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Customer-Service-Unit-Test-Results
          path: "customer/**/surefire-reports/*.xml"
          reporter: java-junit
      
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/customer/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Customer Coverage Report'
          update-comment: true
          
      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./customer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/customer:${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}/customer:latest', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('{0}/customer:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || '' }}
  
  update-dev:
    needs: build-and-test 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/gitops-updater.yml
    with:
      service_name: 'customer'
      environment: 'dev'
      image_tag: ${{ github.sha }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

  update-staging:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/gitops-updater.yml
    with:
      service_name: 'customer'
      environment: 'staging'
      image_tag: ${{ github.ref_name }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

  update-prod:
    needs: build-and-test 
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/gitops-updater.yml
    with:
      service_name: 'customer'
      environment: 'production'
      image_tag: ${{ github.sha }}
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
