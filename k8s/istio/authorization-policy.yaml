# 1. Mặc định: deny all traffic trong namespace yas
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: yas
spec:
  {}   # không có rules → deny tất cả
---
# 2. Các Frontend/UI cho phép Ingress gọi tới
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-storefront-bff
  namespace: yas
spec:
  selector:
    matchLabels:
      app: storefront-bff
  rules:
  - {} # Mở cửa cho Ingress (vì Ingress gọi vào bằng HTTP trần, không có mTLS ID)
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-backoffice-bff
  namespace: yas
spec:
  selector:
    matchLabels:
      app: backoffice-bff
  rules:
  - {} # Mở cửa cho Ingress (vì Ingress gọi vào bằng HTTP trần, không có mTLS ID)
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-storefront-ui
  namespace: yas
spec:
  selector:
    matchLabels:
      app: storefront-ui
  rules:
  - {} # Mở cửa cho Ingress (vì Ingress gọi vào bằng HTTP trần, không có mTLS ID)
---
