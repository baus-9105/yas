---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-swagger-ui
  namespace: yas
spec:
  selector:
    matchLabels:
      app: swagger-ui
  rules:
  - {} # Mở cửa cho Ingress (vì Ingress gọi vào bằng HTTP trần, không có mTLS ID)
---
# 3. Product: Được gọi bởi rất nhiều service
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-product
  namespace: yas
spec:
  selector:
    matchLabels:
      app: product
  rules:
  - from:
    - source:
        principals:
        - "cluster.local/ns/yas/sa/storefront-bff"
        - "cluster.local/ns/yas/sa/backoffice-bff"
        - "cluster.local/ns/yas/sa/cart"
        - "cluster.local/ns/yas/sa/order"
        - "cluster.local/ns/yas/sa/rating"
        - "cluster.local/ns/yas/sa/inventory"
        - "cluster.local/ns/yas/sa/promotion"
        - "cluster.local/ns/yas/sa/sampledata"
        - "cluster.local/ns/yas/sa/search"
---
# 4. Cart: Được gọi bởi BFFs và Order
