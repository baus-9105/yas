apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: cart-retry
  namespace: yas
spec:
  hosts:
  - cart
  http:
  - match:
    - port: 80
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: "5xx,reset,connect-failure"
    timeout: 30s
    route:
    - destination:
        host: cart
        port:
          number: 80
---
