  kind: Role
  name: connector-configuration-role
  apiGroup: rbac.authorization.k8s.io
---
# Source: kafka-cluster/templates/kafka-cluster.yaml
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled

spec:
  kafka:
    version: 4.0.0

    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false

      - name: external
        port: 9094
        type: nodeport
        tls: false

    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1

  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# Source: kafka-cluster/templates/debezium-connect-cluster.yaml
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: debezium-connect-cluster
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  replicas: 1
  bootstrapServers: kafka-cluster-kafka-bootstrap:9092
  image: ghcr.io/nashtech-garage/debezium-connect-postgresql:latest
  group.id: connect-cluster
  configStorageTopic: kafka_connect_configs
  offsetStorageTopic: kafka_connect_offsets
  statusStorageTopic: kafka_connect_status
  config:
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider
    # -1 means it will use the default replication factor configured in the broker
    config.storage.replication.factor: -1
    offset.storage.replication.factor: -1
    status.storage.replication.factor: -1
---
# Source: kafka-cluster/templates/debezium-connector-postgresql-product-db.yaml
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: debezium-connector-postgresql-product-db
  labels:
    strimzi.io/cluster: debezium-connect-cluster
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  config:
    database.hostname: postgresql.postgres
    database.port: 5432
    database.user: ${secrets:postgresql.credentials:username}
    database.password: ${secrets:postgresql.credentials:password}
    topic.prefix: dbproduct
    database.dbname: product
    table.include.list: public.product
    schema.include.list: public
    key.converter.schemas.enable: false
    value.converter.schemas.enable: false
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter: org.apache.kafka.connect.json.JsonConverter
---
# Source: kafka-cluster/templates/kafka-nodepool.yaml
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: kafka-pool
  labels:
    strimzi.io/cluster: kafka-cluster

spec:
  replicas: 1

  roles:
    - broker
    - controller

  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        deleteClaim: false
